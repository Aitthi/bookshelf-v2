name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Vitest 4 / Vite 8 (rolldown) require Node >=20.12 (uses node:util styleText).
        # The published library targets Node >=16 at runtime (ES2022 dist); only the
        # dev/test toolchain needs 20+.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:types
      - run: pnpm attw
      - run: pnpm smoke
